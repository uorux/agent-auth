# agent-auth policy — evaluation order per request:
#   1. platform validator (hard ceilings below under `platforms:`) — fail = deny
#   2. saved rules in the DB (created from Discord's Edit modal), newest first
#   3. the `rules:` list below, first match wins
#   4. `defaults.action`
#
# Durations: approved = min(requested, matched rule's max_duration, defaults.max_duration)

defaults:
  action: surface          # deny | approve | llm | surface
  max_duration: 24h

llm:
  model: anthropic/claude-sonnet-4.5   # OpenRouter model id; per-rule override below
  retry_budget: 2          # LLM denials the agent may retry before human escalation
  timeout_secs: 60

platforms:
  github:
    # GitHub account owners whose repos are brokered (the app must be
    # installed on each)
    repo_allowlist:
      - "otisdog8/*"
      - "uorux/*"
    # Checked first — repos no agent may ever touch, regardless of rules or
    # human approval. Anything that configures the broker's host belongs here.
    repo_denylist:
      - "otisdog8/nixos-dots"
    # Hard ceiling — requests above this are denied before any policy rule runs.
    # Must be a subset of what the GitHub App itself was granted (keep this list
    # and the App's permissions in sync; keys are the API permission names).
    permission_ceiling:
      contents: write
      workflows: write      # pushing .github/workflows/* needs this + contents
      secrets: write
      variables: write
      actions: read
      pull_requests: write
      issues: write
      checks: read
      # org-level — NOT repo-scoped: they apply org-wide on any token that
      # requests them, so keep sensitive ones on `surface` in the rules below
      organization_secrets: write
      organization_variables: write
      organization_self_hosted_runners: read
    # Any request touching these permissions is forced to human review even if a
    # rule/LLM would clear it (your own scope-pinned auto-approve rule still
    # applies). Attacker-controllable justification text can't talk the LLM into
    # a secrets/admin grant.
    sensitive_permissions:
      - secrets
      - administration
      - organization_secrets
  homelab:
    # Only these LLDAP groups are brokered. Authelia rules per group are
    # configured in Authelia itself, not here.
    allowed_groups:
      - svc-gitea
      - svc-sonarr
      - svc-radarr
    group_descriptions:
      svc-gitea: "Gitea access via Authelia — mint your own Gitea token once in"
      svc-sonarr: "Sonarr web UI + API"
      svc-radarr: "Radarr web UI + API"
  kubernetes:
    # Any namespace is brokerable — containment comes from narrow roles and
    # human review, not from walling namespaces off (an agent with gitops
    # access can reach them regardless).
    namespace_allowlist:
      - "*"
    # Roles agents may request, narrowest first. The broker's own RBAC must
    # hold `bind` on exactly these (deploy/k8s.yaml resourceNames) — widening
    # this list widens the broker's standing credential too. Prefer purpose-
    # built roles (see traefik-patcher in deploy/k8s.yaml) so a single "allow"
    # grants one verb on one resource, not blanket namespace edit.
    role_allowlist:
      - view
      - logs-reader       # get+list pods and pod logs
      - traefik-patcher   # get+patch on deployments/traefik only
      - workload-manager  # restart+scale deployments/statefulsets
      - cm-editor         # edit existing configmaps
      - port-forwarder    # port-forward into pods
      - job-runner        # create one-off jobs + read their logs
      - pod-exec          # exec into pods (sensitive)
      - secret-reader     # read secrets (sensitive)
      - edit
    # Shown to agents via GET /v1/catalog so they pick the right narrow role.
    role_descriptions:
      view: "read-only access to all resources in the namespace, including pod logs and events"
      logs-reader: "read pod logs only (get + list on pods and pods/log) — prefer over view when logs are all you need"
      traefik-patcher: "get + patch the traefik Deployment only — nothing else"
      workload-manager: "restart and scale Deployments/StatefulSets (patch + scale subresource; patch can also change images)"
      cm-editor: "edit existing ConfigMaps (get/list/watch/update/patch; no create or delete)"
      port-forwarder: "port-forward into pods in the namespace"
      job-runner: "create one-off Jobs and read their pods/logs (runs arbitrary code — human/LLM reviewed)"
      pod-exec: "exec into pods (acts as the pod — human approval required)"
      secret-reader: "read Secrets in the namespace (human approval required)"
      edit: "full read-write in the namespace (broad: can run pods as any SA)"
    # Always forced to human review (belt-and-suspenders with the surface rule).
    sensitive_roles:
      - edit
      - admin
      - pod-exec
      - secret-reader

rules:
  # Low-risk homelab groups: auto-approve, short leash
  - match: {platform: homelab, resource: svc-sonarr}
    action: approve
    constraints: {max_duration: 12h}
    reason: sonarr api access is low risk

  # Gitea access for the homelab agent: LLM-reviewed
  - match: {agent: "homelab-*", platform: homelab, resource: svc-gitea}
    action: llm
    constraints: {max_duration: 8h}

  # Kubernetes — the capability IS the role, so friction scales with blast
  # radius. Read-only and single-purpose roles auto-approve; broad tiers surface.
  - match: {platform: kubernetes, capability: view}
    action: approve
    constraints: {max_duration: 8h}
  - match: {platform: kubernetes, capability: logs-reader}
    action: approve
    constraints: {max_duration: 8h}
  - match: {platform: kubernetes, capability: traefik-patcher}
    action: approve
    constraints: {max_duration: 1h}   # narrow verb on one named resource
  # Restart/scale is the most common remediation; auto-approve on a short
  # leash. Note patch on workloads can also change images/env, not just scale.
  - match: {platform: kubernetes, capability: workload-manager}
    action: approve
    constraints: {max_duration: 4h}
  # Config edits and port-forwards: moderate blast radius, LLM-reviewed
  - match: {platform: kubernetes, capability: cm-editor}
    action: llm
    constraints: {max_duration: 2h}
  - match: {platform: kubernetes, capability: port-forwarder}
    action: llm
    constraints: {max_duration: 2h}
  # job-runner runs arbitrary code — LLM review with a tight leash; pod-exec
  # and secret-reader are in sensitive_roles so they always reach a human.
  - match: {platform: kubernetes, capability: job-runner}
    action: llm
    constraints: {max_duration: 2h}
  # edit / admin / anything else → a human decides (Discord shows the namespace)
  - match: {platform: kubernetes}
    action: surface

  # GitHub repo access for dev agents: LLM-reviewed with a strong model
  - match: {agent: "sde-*", platform: github}
    action: llm
    constraints:
      max_duration: 8h
      llm_model: anthropic/claude-sonnet-4.5
      retry_budget: 2

  # NOTE: requests whose scope includes organization_* permissions are org-wide;
  # nothing routes them to auto-approve here, so they fall through to `surface`
  # (or add an explicit rule for them if that changes).

  # CLI agents (Claude Code / Codex): register one agent PER FOLDER with its
  # key in that folder's env, named <agent-type>-<folder>-<host> to match the
  # rest of the fleet (hermes-homelab-recusant, claude-nixos-dots-uorux, ...).
  # The key is the permission boundary, so folder-level rules are just agent
  # name matches — e.g. only the homelab folder's claude may touch kubernetes:
  #
  #   - match: {agent: "claude-homelab-*", platform: kubernetes, capability: view}
  #     action: approve
  #     constraints: {max_duration: 8h}
  #
  # a2a grants are agent-level (all sessions of a folder share them); the grant
  # only lets them OPEN threads to service agents — the responder can still
  # reject, and replies inside a thread need no reverse grant.
  #
  # Delegation ("on behalf of"): an agent may anchor a request to an OPEN a2a
  # thread; the thread's other participant becomes the delegator and rules with
  # a `delegator:` glob authorize the PAIR. Rules WITHOUT `delegator:` never
  # auto-approve delegated requests (they fall through to surface), so nothing
  # written before delegation existed can be laundered through it. Example —
  # hermes may run homelab jobs when a claude folder asked it to:
  #
  #   - match: {agent: "hermes-homelab-*", platform: kubernetes, capability: job-runner,
  #             delegator: "claude-*"}
  #     action: approve
  #     constraints: {max_duration: 2h}
  - match: {agent: "claude-*", platform: a2a}
    action: approve
    constraints: {max_duration: 12h}
  - match: {agent: "codex-*", platform: a2a}
    action: approve
    constraints: {max_duration: 12h}
  # Unknown pairs: ask once, then use Edit→rule
  - match: {platform: a2a}
    action: surface

  # Google (stub) — always a human decision while unimplemented
  - match: {platform: google}
    action: surface
