# agent-auth policy — evaluation order per request:
#   1. platform validator (hard ceilings below under `platforms:`) — fail = deny
#   2. saved rules in the DB (created from Discord's Edit modal), newest first
#   3. the `rules:` list below, first match wins
#   4. `defaults.action`
#
# Durations: approved = min(requested, matched rule's max_duration, defaults.max_duration)

defaults:
  action: surface          # deny | approve | llm | surface
  max_duration: 24h

llm:
  model: anthropic/claude-sonnet-4.5   # OpenRouter model id; per-rule override below
  retry_budget: 2          # LLM denials the agent may retry before human escalation
  timeout_secs: 60

platforms:
  github:
    # GitHub account owners whose repos are brokered (the app must be
    # installed on each)
    repo_allowlist:
      - "otisdog8/*"
      - "uorux/*"
    # Checked first — repos no agent may ever touch, regardless of rules or
    # human approval. Anything that configures the broker's host belongs here.
    repo_denylist:
      - "otisdog8/nixos-dots"
    # Hard ceiling — requests above this are denied before any policy rule runs.
    # Must be a subset of what the GitHub App itself was granted (keep this list
    # and the App's permissions in sync; keys are the API permission names).
    permission_ceiling:
      contents: write
      workflows: write      # pushing .github/workflows/* needs this + contents
      secrets: write
      variables: write
      actions: read
      pull_requests: write
      issues: write
      checks: read
      # org-level — NOT repo-scoped: they apply org-wide on any token that
      # requests them, so keep sensitive ones on `surface` in the rules below
      organization_secrets: write
      organization_variables: write
      organization_self_hosted_runners: read
  homelab:
    # Only these LLDAP groups are brokered. Authelia rules per group are
    # configured in Authelia itself, not here.
    allowed_groups:
      - svc-gitea
      - svc-sonarr
      - svc-radarr
    group_descriptions:
      svc-gitea: "Gitea access via Authelia — mint your own Gitea token once in"
      svc-sonarr: "Sonarr web UI + API"
      svc-radarr: "Radarr web UI + API"
  kubernetes:
    # Any namespace is brokerable — containment comes from narrow roles and
    # human review, not from walling namespaces off (an agent with gitops
    # access can reach them regardless).
    namespace_allowlist:
      - "*"
    # Roles agents may request, narrowest first. The broker's own RBAC must
    # hold `bind` on exactly these (deploy/k8s.yaml resourceNames) — widening
    # this list widens the broker's standing credential too. Prefer purpose-
    # built roles (see traefik-patcher in deploy/k8s.yaml) so a single "allow"
    # grants one verb on one resource, not blanket namespace edit.
    role_allowlist:
      - view
      - logs-reader       # get+list pods and pod logs
      - traefik-patcher   # get+patch on deployments/traefik only
      - edit
    # Shown to agents via GET /v1/catalog so they pick the right narrow role.
    role_descriptions:
      view: "read-only access to all resources in the namespace"
      logs-reader: "read pod logs (get + list on pods and pods/log)"
      traefik-patcher: "get + patch the traefik Deployment only — nothing else"
      edit: "full read-write in the namespace (broad: can run pods as any SA)"

rules:
  # Low-risk homelab groups: auto-approve, short leash
  - match: {platform: homelab, resource: svc-sonarr}
    action: approve
    constraints: {max_duration: 12h}
    reason: sonarr api access is low risk

  # Gitea access for the homelab agent: LLM-reviewed
  - match: {agent: "homelab-*", platform: homelab, resource: svc-gitea}
    action: llm
    constraints: {max_duration: 8h}

  # Kubernetes — the capability IS the role, so friction scales with blast
  # radius. Read-only and single-purpose roles auto-approve; broad tiers surface.
  - match: {platform: kubernetes, capability: view}
    action: approve
    constraints: {max_duration: 8h}
  - match: {platform: kubernetes, capability: logs-reader}
    action: approve
    constraints: {max_duration: 8h}
  - match: {platform: kubernetes, capability: traefik-patcher}
    action: approve
    constraints: {max_duration: 1h}   # narrow verb on one named resource
  # edit / admin / anything else → a human decides (Discord shows the namespace)
  - match: {platform: kubernetes}
    action: surface

  # GitHub repo access for dev agents: LLM-reviewed with a strong model
  - match: {agent: "sde-*", platform: github}
    action: llm
    constraints:
      max_duration: 8h
      llm_model: anthropic/claude-sonnet-4.5
      retry_budget: 2

  # NOTE: requests whose scope includes organization_* permissions are org-wide;
  # nothing routes them to auto-approve here, so they fall through to `surface`
  # (or add an explicit rule for them if that changes).

  # Agent-to-agent chatter between known agents: ask once, then use Edit→rule
  - match: {platform: a2a}
    action: surface

  # Google (stub) — always a human decision while unimplemented
  - match: {platform: google}
    action: surface
