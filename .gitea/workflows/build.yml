name: Build and Deploy agent-auth
on:
  push:
    branches:
      - 'main'
  pull_request:

# Least privilege: the build only reads the repo. Registry/k8s access comes from
# explicit secrets on the main-only steps, not the workflow token.
permissions:
  contents: read

jobs:
  build:
    # SECURITY: uorux-scale-set is a self-hosted runner. Only allow untrusted /
    # fork PRs to run here if that runner is ephemeral and isolated — otherwise a
    # malicious PR can compromise the runner. Restrict PR triggers to trusted
    # branches in the Gitea repo settings if that's not guaranteed.
    runs-on: uorux-scale-set
    steps:
      # All third-party actions pinned by commit SHA (version in comment) so a
      # moved tag / branch can't swap the code we run. Bump deliberately.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Fix cachix installer
        run: sudo apt update && sudo apt install -y lzma xz-utils
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            system-features = kvm
      # magic-nix-cache is deprecated upstream; pinned to a known-good main SHA
      # until replaced (e.g. with flakehub-cache-action) or dropped.
      - uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main @ 2026-07
      - name: Run tests
        run: |
          nix develop --command bash -c "uv sync && uv run pytest -q"
      - name: Log in to Gitea Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: git.rooty.dev
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          nix build .#dockerImage
          docker load < result
          docker tag agent-auth:latest git.rooty.dev/jrt/agent-auth:latest
          docker tag agent-auth:latest git.rooty.dev/jrt/agent-auth:${{ github.sha }}
          docker push git.rooty.dev/jrt/agent-auth:latest
          docker push git.rooty.dev/jrt/agent-auth:${{ github.sha }}
      - name: Setup kubectl
        if: github.ref == 'refs/heads/main'
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        id: install
      - name: Restart deployment
        if: github.ref == 'refs/heads/main'
        run: kubectl rollout restart deployment agent-auth --namespace agent-auth
